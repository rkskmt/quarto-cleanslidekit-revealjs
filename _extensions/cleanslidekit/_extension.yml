title: CleanSlideKit RevealJS
author: rkskmt
version: 1.1.1
quarto-required: ">=1.4.0"
contributes:
  formats:
    revealjs:
      # --- Geometry & look (clean-revealjs derived) ---
      width: 1280
      height: 720
      margin: 0.06
      highlight-style: github
      scrollable: true
      menu: false
      footer: " "
      theme:
        - default
        - theme.scss
      # JP-friendly default; override in your document front matter if needed.
      lang: ja
      # Mermaid diagram defaults (tight spacing for slide real estate).
      mermaid:
        theme: default
        flowchart:
          nodeSpacing: 10
          rankSpacing: 15
      # Ship the CSS/JS UI kit alongside the rendered deck. format-resources
      # copies these flat into the output dir so the bare hrefs below resolve.
      format-resources:
        - custom.css
        - slide-ui.js
        - search-ui.js
        - peek-ui.js
      include-in-header:
        text: |
          <link rel="stylesheet" href="custom.css">
          <script src="slide-ui.js" defer></script>
          <script src="search-ui.js" defer></script>
          <script src="peek-ui.js" defer></script>
      # Self-contained Lua filters. d2 and lightbox are intentionally NOT here:
      # they are separate extensions (see README) and would hard-fail rendering
      # if listed but not installed. Add them in your own _quarto.yml if wanted.
      filters:
        - slide-body.lua
        - hl.lua
        - fw-colon.lua
        - cite-image.lua
        - plotly-iframe.lua
        - figscale.lua
